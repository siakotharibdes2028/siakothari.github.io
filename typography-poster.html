<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sia Kothari | Typography Poster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .brand-identity-main {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 120px 5% 80px;
        }
        .bi-projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 800px;
            width: 100%;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="logo">
                <span class="logo-text">Sia</span>
            </a>
            <div class="nav-right" style="margin-left:auto;">
                <a href="index.html" class="btn btn-secondary nav-cta">Back to Home</a>
            </div>
        </div>
    </nav>

    <main class="brand-identity-main">
        <div class="section-title-wrapper">
            <h1 class="section-title text-center"><span class="highlight-yellow">Typography</span> Poster</h1>
            <p class="text-center mt-20" style="font-size: 1.25rem; color: #555; max-width: 600px; margin: 20px auto 0;">
                Select a category below to view the detailed posters.
            </p>
        </div>
        
        <div class="bi-projects-grid">
            <!-- Sula Vineyards -->
            <a href="tp-sula-vineyards.html" class="project-card tilt-left bg-pink">
                <div class="project-image">
                    <div class="placeholder-img" style="background: linear-gradient(135deg, #fce4ec, #f8bbd0); width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#c2185b; font-weight:700; font-size:2rem; text-align:center; padding: 20px;">Sula Vineyards</div>
                </div>
                <div class="project-info">
                    <h3>Sula Vineyards</h3>
                    <span class="btn btn-white">See Project</span>
                </div>
            </a>
            
            <!-- Summer -->
            <a href="tp-summer.html" class="project-card tilt-right bg-blue">
                <div class="project-image">
                    <div class="placeholder-img" style="background: linear-gradient(135deg, #e3f2fd, #bbdefb); width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#1976d2; font-weight:700; font-size:2rem; text-align:center; padding: 20px;">Summer</div>
                </div>
                <div class="project-info">
                    <h3>Summer</h3>
                    <span class="btn btn-white">See Project</span>
                </div>
            </a>
        </div>
    </main>

    <footer>
        <p>Made with ❤️ by Sia Kothari &copy; 2026</p>
    </footer>
<script src="script.js"></script>
</body>
</html>
