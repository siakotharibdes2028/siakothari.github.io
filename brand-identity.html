<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sia Kothari | Brand Identity & Logo Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .brand-identity-main {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 120px 5% 80px;
        }
        .bi-projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            max-width: 900px;
            width: 100%;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="logo">
                <span class="logo-text">Sia</span>
            </a>
            
            <div class="nav-right" style="margin-left:auto;">
                <a href="index.html" class="btn btn-secondary nav-cta">Back to Home</a>
            </div>
        </div>
    </nav>

    <main class="brand-identity-main">
        <div class="section-title-wrapper">
            <h1 class="section-title text-center"><span class="highlight-yellow">Brand Identity</span> & Logo Design</h1>
            <p class="text-center mt-20" style="font-size: 1.25rem; color: #555; max-width: 600px; margin: 20px auto 0;">
                Select a project below to view its details, branding guidelines, and visual identity.
            </p>
        </div>
        
        <div class="bi-projects-grid">
            <!-- Fam-Circle -->
            <a href="fam-circle.html" class="project-card tilt-left bg-pink">
                <div class="project-image">
                    <div class="placeholder-img" style="background: linear-gradient(135deg, #fce4ec, #f8bbd0); width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#d81b60; font-weight:700; font-size:2rem; text-align:center; padding: 20px;">Fam-Circle<br>Identity</div>
                </div>
                <div class="project-info">
                    <h3>Fam-Circle</h3>
                    <span class="btn btn-white">See Project</span>
                </div>
            </a>
            
            <!-- Re-Find Events -->
            <a href="re-find-events.html" class="project-card tilt-right bg-blue">
                <div class="project-image">
                    <div class="placeholder-img" style="background: linear-gradient(135deg, #e3f2fd, #bbdefb); width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#1976d2; font-weight:700; font-size:2rem; text-align:center; padding: 20px;">Re-Find Events<br>Branding</div>
                </div>
                <div class="project-info">
                    <h3>Re-Find Events</h3>
                    <span class="btn btn-white">See Project</span>
                </div>
            </a>
        </div>
    </main>

    <footer>
        <p>Made with ❤️ by Sia Kothari &copy; 2026</p>
    </footer>
<script src="script.js"></script>
</body>
</html>
